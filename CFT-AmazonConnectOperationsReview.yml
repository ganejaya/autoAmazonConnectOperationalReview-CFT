                          kds_html += "</table>"
                      else:
                          kds_html += '<br><p style="color:#22c55e; font-weight:bold;">&#9989; All recommended KDS alarms are configured.</p>'

                      if kds_found:
                          kds_html += f"""<br><h4>&#9989; Configured KDS Alarms ({len(kds_found)})</h4>
                              <table style="width: 100%">
                              <tr><th>Stream</th><th>Metric</th><th>Alarm Name</th><th>State</th><th>Actions?</th></tr>"""
                          for f_item in kds_found:
                              st_c = STATE_COLORS.get(f_item.get("alarm_state", "UNKNOWN"), "#9ca3af")
                              is_triggered = f_item.get("alarm_state") == "ALARM"
                              row_bg = "#fef2f2" if is_triggered else "#f0fdf4"
                              actions_txt = "&#9989; Yes" if f_item.get("has_actions") else "&#9888;&#65039; No"
                              kds_html += f"""<tr style="background-color: {row_bg};">
                                  <td><code>{escape(f_item["stream_name"])}</code></td>
                                  <td><code>{escape(f_item["metric_name"])}</code></td>
                                  <td>{escape(f_item.get("alarm_name", ""))}</td>
                                  <td><span style="background:{st_c}; color:#fff; padding:2px 8px; border-radius:999px; font-size:0.8em;">{escape(f_item.get("alarm_state", "?"))}</span></td>
                                  <td>{actions_txt}</td>
                              </tr>"""
                          kds_html += "</table>"

                      kds_html += """</div>"""
                      html_output += kds_html

                      if kds_missing:
                          checks.append({"pillar": "Observability", "check": "CloudWatch Alarm Validation - Amazon Kinesis Data Streams", "status": "warn", "detail": f"{len(kds_missing)} recommended KDS alarm(s) missing across {len(kds_stream_names)} stream(s)", "anchor": "obs-kds-alarms"})
                      else:
                          checks.append({"pillar": "Observability", "check": "CloudWatch Alarm Validation - Amazon Kinesis Data Streams", "status": "pass", "detail": f"All recommended alarms configured for {len(kds_stream_names)} stream(s)", "anchor": "obs-kds-alarms"})

                      duration = time.time() - lambda_exec_intermediate_time
                      logger.info(f"KDS Alarm Validation Module execution time: {duration}")
                      lambda_exec_intermediate_time = time.time()

                  # ── Missed Calls Analysis (under Observability) ──
                  html_output += f"""<div class="section" id="ch-missed">
                      <h3>Missed Calls Analysis</h3>
                      """
                  html_output += summarize_missed_calls(instance_id, days_back)

                  # Missed calls check
                  try:
                      _mc_resp = cloudwatch_client.get_metric_statistics(
                          Namespace='AWS/Connect', MetricName='MissedCalls',
                          Dimensions=[{'Name': 'InstanceId', 'Value': instance_id}, {'Name': 'MetricGroup', 'Value': 'VoiceCalls'}],
                          StartTime=datetime.utcnow() - timedelta(days=days_back), EndTime=datetime.utcnow(),
                          Period=86400, Statistics=['Sum'])
                      _mc_total = int(sum(dp.get('Sum', 0) for dp in _mc_resp.get('Datapoints', [])))
                  except Exception:
                      _mc_total = 0

                  if _mc_total > 50:
                      checks.append({"pillar": "Observability", "check": "Missed Calls", "status": "warn", "detail": f"{_mc_total:,} missed calls in last {days_back} days", "anchor": "ch-missed"})
                  elif _mc_total > 0:
                      checks.append({"pillar": "Observability", "check": "Missed Calls", "status": "pass", "detail": f"{_mc_total:,} missed calls in last {days_back} days", "anchor": "ch-missed"})
                  else:
                      checks.append({"pillar": "Observability", "check": "Missed Calls", "status": "pass", "detail": "No missed calls detected", "anchor": "ch-missed"})

                  duration = time.time() - lambda_exec_intermediate_time
                  logger.info(f"Missed Calls Analysis Module execution time: {duration}")
                  lambda_exec_intermediate_time = time.time()

                  html_output += """</div>"""

                  #Phone Number Analysis (reuse data from carrier diversity scan)
                  logger.debug(f"Phone type counts: {phone_type_counts}")

                  metadata = phone_type_counts.get('_metadata', {})
                  total_numbers = metadata.get('total_numbers', 0)

                  html_output += f"""
                      <h2>Cost Considerations</h2>
                      <div class="section" id="cost-phone">
                      <h3>Phone Number Analysis</h3>
                      <p>Analyzed {escape(str(total_numbers))} phone numbers.</p>
                      """

                  if total_numbers == 0:
                       html_output += "<p>No phone numbers analyzed.</p>"

                  else :    # Check for toll-free dominance
                      toll_free_count = phone_type_counts.get('TOLL_FREE', 0)
                      if toll_free_count > 0:
                          toll_free_percentage = (toll_free_count / total_numbers) * 100
                          if toll_free_percentage > 70:
                              html_output += (f"<p>High toll-free usage: {toll_free_percentage:.1f}% of numbers are toll-free (potential cost optimization opportunity)</p>")
                          elif toll_free_percentage < 20:
                              html_output += (f"<p>Low toll-free usage: Only {toll_free_percentage:.1f}% are toll-free (consider customer accessibility)</p>")

                      # Check for DID usage
                      did_count = phone_type_counts.get('DID', 0)
                      if did_count > 0:
                          did_percentage = (did_count / total_numbers) * 100
                          html_output += (f"<p>DID numbers provide local presence: {did_percentage:.1f}% of total numbers</p>")

                      # Check for international presence
                      metadata = phone_type_counts.get('_metadata', {})
                      countries_count = metadata.get('countries_count', 0)
                      if countries_count > 1:
                          html_output += (f"<p>International presence: Numbers in {countries_count} countries</p>")

                      # Check for special types
                      uifn_count = phone_type_counts.get('UIFN', 0)
                      short_code_count = phone_type_counts.get('SHORT_CODE', 0)

                      if uifn_count > 0:
                          html_output += (f"<p>Global accessibility: {uifn_count} UIFN numbers for international toll-free access</p>")

                      if short_code_count > 0:
                          html_output += (f"<p>SMS capability: {short_code_count} short codes for messaging services</p>")    

                      html_output += f"""
                          <h4>Recommendations</h4>"""

                      if phone_type_counts.get('TOLL_FREE', 0) == 0:
                          html_output += f"""    
                          {get_recommendation("phone_number_no_tollfree")}
                          """
                      if phone_type_counts.get('TOLL_FREE', 0) < phone_type_counts.get('DID', 0):
                          html_output += get_recommendation("phone_number_more_did")

                      else :
                          html_output += get_recommendation("phone_number_tollfree_dominant")

                  #Module runtime duration
                  duration = time.time() - lambda_exec_intermediate_time
                  logger.info(f"Phone Number Analysis Module execution time: {duration}")
                  lambda_exec_intermediate_time = time.time()

                  # Phone number cost check
                  if total_numbers == 0:
                      checks.append({"pillar": "Cost", "check": "Phone Number Mix", "status": "info", "detail": "No phone numbers to analyze", "anchor": "cost-phone"})
                  else:
                      toll_free = phone_type_counts.get('TOLL_FREE', 0)
                      did = phone_type_counts.get('DID', 0)
                      if toll_free == 0 and did > 0:
                          checks.append({"pillar": "Cost", "check": "Phone Number Mix", "status": "warn", "detail": f"{did} DIDs, 0 toll-free - consider toll-free for redundancy", "anchor": "cost-phone"})
                      elif toll_free > 0 and did > 0 and toll_free < did:
                          checks.append({"pillar": "Cost", "check": "Phone Number Mix", "status": "info", "detail": f"{toll_free} toll-free, {did} DIDs - review cost vs resilience trade-off", "anchor": "cost-phone"})
                      else:
                          checks.append({"pillar": "Cost", "check": "Phone Number Mix", "status": "pass", "detail": f"{total_numbers} numbers analyzed, mix looks appropriate", "anchor": "cost-phone"})

                  html_output += """</div>"""

                  # ── Channel Usage Analysis ──
                  logger.debug("Starting Channel Usage Analysis...")
                  channel_usage_ok = False
                  try:
                      html_output += channel_usage_to_html(instance_id, instance_arn, days_back)
                      channel_usage_ok = True
                      logger.debug("Channel Usage Analysis complete")
                  except Exception as e:
                      logger.error(f"Channel Usage Analysis failed: {e}")
                      html_output += f"""<div class="section" id="cost-channel">
                          <h3>Channel Usage ({days_back}-day)</h3>
                          <p style="color:#ef4444;">Error retrieving channel usage data: {escape(str(e))}</p>
                          </div>"""

                  # Channel usage cost check
                  if channel_usage_ok:
                      checks.append({"pillar": "Cost", "check": "Channel Usage", "status": "info", "detail": f"Review {days_back}-day channel mix for cost optimization opportunities", "anchor": "cost-channel"})
                  else:
                      checks.append({"pillar": "Cost", "check": "Channel Usage", "status": "warn", "detail": "Could not retrieve channel data", "anchor": "cost-channel"})

                  #Module runtime duration
                  duration = time.time() - lambda_exec_intermediate_time
                  logger.info(f"Channel Usage Analysis Module execution time: {duration}")
                  lambda_exec_intermediate_time = time.time()

                  html_output += """
                      </div>
                      </body>
                      </html>
                      """

                  # ── Generate Executive Summary and inject at top ──
                  pass_count = sum(1 for c in checks if c["status"] == "pass")
                  fail_count = sum(1 for c in checks if c["status"] == "fail")
                  warn_count = sum(1 for c in checks if c["status"] == "warn")
                  info_count = sum(1 for c in checks if c["status"] == "info")
                  total_checks = len(checks)

                  STATUS_CONFIG = {
                      "pass": {"icon": "&#9989;", "color": "#22c55e", "bg": "#f0fdf4", "border": "#bbf7d0", "label": "PASS"},
                      "fail": {"icon": "&#10060;", "color": "#ef4444", "bg": "#fef2f2", "border": "#fecaca", "label": "FAIL"},
                      "warn": {"icon": "&#9888;&#65039;", "color": "#f59e0b", "bg": "#fffbeb", "border": "#fde68a", "label": "WARN"},
                      "info": {"icon": "&#128269;", "color": "#3b82f6", "bg": "#eff6ff", "border": "#bfdbfe", "label": "REVIEW"},
                  }

                  summary_html = f"""<h2>Executive Summary</h2>
                  <div class="section">
                      <div style="display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px;">
                          <div style="flex:1; min-width:120px; padding:14px 18px; border-radius:8px; border:1px solid #bbf7d0; background:#f0fdf4; text-align:center;">
                              <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; color:#64748b; margin-bottom:4px;">Passed</div>
                              <div style="font-size:1.3rem; font-weight:700; color:#22c55e;">{pass_count}</div>
                          </div>
                          <div style="flex:1; min-width:120px; padding:14px 18px; border-radius:8px; border:1px solid #fde68a; background:#fffbeb; text-align:center;">
                              <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; color:#64748b; margin-bottom:4px;">Warnings</div>
                              <div style="font-size:1.3rem; font-weight:700; color:#f59e0b;">{warn_count}</div>
                          </div>
                          <div style="flex:1; min-width:120px; padding:14px 18px; border-radius:8px; border:1px solid #fecaca; background:#fef2f2; text-align:center;">
                              <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; color:#64748b; margin-bottom:4px;">Failed</div>
                              <div style="font-size:1.3rem; font-weight:700; color:#ef4444;">{fail_count}</div>
                          </div>
                          <div style="flex:1; min-width:120px; padding:14px 18px; border-radius:8px; border:1px solid #bfdbfe; background:#eff6ff; text-align:center;">
                              <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; color:#64748b; margin-bottom:4px;">Review</div>
                              <div style="font-size:1.3rem; font-weight:700; color:#3b82f6;">{info_count}</div>
                          </div>
                          <div style="flex:1; min-width:120px; padding:14px 18px; border-radius:8px; border:1px solid #e2e8f0; background:#f8fafc; text-align:center;">
                              <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; color:#64748b; margin-bottom:4px;">Total Checks</div>
                              <div style="font-size:1.3rem; font-weight:700;">{total_checks}</div>
                          </div>
                      </div>
                      <table style="width:100%;">
                          <tr><th>Pillar</th><th>Check</th><th>Status</th><th>Detail</th></tr>"""

                  # Sort checks by pillar order (matching HTML), then by status severity within each pillar
                  pillar_order = ["Security", "Resilience", "Operational Excellence", "Capacity Analysis", "Observability", "Cost"]
                  status_order = {"fail": 0, "warn": 1, "info": 2, "pass": 3}
                  # Fixed order for Capacity Analysis checks
                  capacity_check_order = [
                      "Amazon Connect Instance Resource Limits",
                      "Amazon Connect Concurrency Limits",
                      "Amazon Connect API Limits (Account Level)",
                  ]
                  sorted_checks = sorted(checks, key=lambda c: (
                      pillar_order.index(c["pillar"]) if c["pillar"] in pillar_order else 99,
                      capacity_check_order.index(c["check"]) if c["pillar"] == "Capacity Analysis" and c["check"] in capacity_check_order else status_order.get(c["status"], 99)
                  ))

                  current_pillar = ""
                  for c in sorted_checks:
                      st = c["status"]
                      anchor = c.get("anchor", "")
                      # Add pillar separator row when pillar changes
                      if c["pillar"] != current_pillar:
                          current_pillar = c["pillar"]
                          pillar_checks = [x for x in sorted_checks if x["pillar"] == current_pillar]
                          pillar_pass = sum(1 for x in pillar_checks if x["status"] == "pass")
                          pillar_fail = sum(1 for x in pillar_checks if x["status"] == "fail")
                          pillar_warn = sum(1 for x in pillar_checks if x["status"] == "warn")
                          pillar_badge = ""
                          if pillar_fail > 0:
                              pillar_badge = f'<span style="background:#ef4444; color:#fff; padding:2px 8px; border-radius:999px; font-size:0.75em; margin-left:8px;">{pillar_fail} fail</span>'
                          if pillar_warn > 0:
                              pillar_badge += f'<span style="background:#f59e0b; color:#fff; padding:2px 8px; border-radius:999px; font-size:0.75em; margin-left:4px;">{pillar_warn} warn</span>'
                          summary_html += f"""<tr style="background-color:#f1f5f9;">
                              <td colspan="4" style="font-weight:700; font-size:0.9rem; padding:10px 14px; color:#334155;">{escape(current_pillar)} ({len(pillar_checks)} checks) {pillar_badge}</td>
                          </tr>"""
                      check_link = f'<a href="#{anchor}" style="color:{STATUS_CONFIG[st]["color"]}; text-decoration:none; border-bottom:1px dashed {STATUS_CONFIG[st]["border"]}; font-weight:600;">{escape(c["check"])}</a>' if anchor else f'<span style="font-weight:600;">{escape(c["check"])}</span>'
                      summary_html += f"""<tr style="background-color:{STATUS_CONFIG[st]["bg"]}; border-left:4px solid {STATUS_CONFIG[st]["border"]};">
                          <td style="font-weight:700; font-size:0.85rem;">{escape(c["pillar"])}</td>
                          <td style="font-size:0.85rem;">{check_link}</td>
                          <td style="font-size:0.85rem;">{STATUS_CONFIG[st]["icon"]} <span style="color:{STATUS_CONFIG[st]["color"]}; font-weight:700;">{STATUS_CONFIG[st]["label"]}</span></td>
                          <td style="font-size:0.85rem;">{escape(c["detail"])}</td>
                      </tr>"""

                  summary_html += """</table></div>"""

                  # Replace placeholder with actual summary
                  html_output = html_output.replace(SUMMARY_PLACEHOLDER, summary_html)

                  # Get Date timestamp
                  now_utc = datetime.now(timezone.utc)
                  date_time = now_utc.strftime("%m%d%Y_%H%M%S")

                  # Get instance alias (name) for the S3 object key
                  instance_name = instance_data.get('InstanceAlias', instance_id) if instance_data else instance_id

                  # Upload to S3
                  s3_key = f"connect-review_{instance_name}_{aws_region}_{date_time}.html"
                  upload_string_to_s3(html_output, s3_reporting_bucket, s3_key, 'text/html')
                  logger.info(f"Report uploaded to s3://{s3_reporting_bucket}/{s3_key}")

                  lambda_exec_end_time = time.time()
                  duration = lambda_exec_end_time - lambda_exec_start_time
                  print(f"Lambda execution time: {duration}")

                  return {
                          'statusCode': 200,
                          'body': json.dumps({'success': f'Amazon Connect Ops Review document succesfully generated. Execution duration: {duration} seconds")'})
                      }

              except Exception as e:
                  exc_type, exc_obj, exc_tb = sys.exc_info()
                  lineno = exc_tb.tb_lineno
                  (f"Amazon Ops Review Client Error: {e}")
                  logger.error(f"An error occurred: {e}")
                  logger.error(f"Error on line: {lineno}")
                  logger.error(f"Traceback: {traceback.print_exc()}")
                  return {
                      'statusCode': 400,
                      'body': json.dumps({
                          'error': 'Amazon Ops Review API Error',
                          'line': lineno,
                          'message': str(traceback.print_exc())
                      })
                  }

  # CloudWatch Log Group for Lambda
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "/aws/lambda/amazonConnectOperationalReview-auto"
      RetentionInDays: 30

Outputs:
  LambdaFunctionArn:
    Description: 'ARN of the Lambda function'
    Value: !GetAtt LambdaFunctionAmazonConnectOperationalReviewauto.Arn
  
  LambdaFunctionName:
    Description: 'Name of the Lambda function'
    Value: !Ref LambdaFunctionAmazonConnectOperationalReviewauto
