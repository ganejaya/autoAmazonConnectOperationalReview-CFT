          def validate_connect_alarms(cw_client, instance_id: str) -> dict:
              """Validate recommended alarms against existing CloudWatch alarms for a Connect instance."""
              existing = []
              paginator = cw_client.get_paginator("describe_alarms")
              for page in paginator.paginate():
                  for alarm in page.get("MetricAlarms", []):
                      if alarm.get("Namespace") != "AWS/Connect":
                          continue
                      for dim in alarm.get("Dimensions", []):
                          if dim["Name"] == "InstanceId" and dim["Value"] == instance_id:
                              existing.append(alarm)
                              break

              results = {"found": [], "missing": [], "extra": []}
              recommended_metrics = set()

              for rec in RECOMMENDED_CONNECT_ALARMS:
                  recommended_metrics.add(rec["metric_name"])
                  matched = None
                  for alarm in existing:
                      if alarm.get("MetricName") == rec["metric_name"] and alarm.get("Namespace") == rec["namespace"]:
                          has_instance = any(d["Name"] == "InstanceId" and d["Value"] == instance_id for d in alarm.get("Dimensions", []))
                          if has_instance:
                              matched = alarm
                              break
                  entry = {
                      "metric_name": rec["metric_name"],
                      "description": rec["description"],
                      "severity": rec["severity"],
                      "rec_statistic": rec["statistic"],
                      "rec_threshold": rec["threshold"],
                      "rec_period": rec["period"],
                      "rec_comparison": rec["comparison"],
                  }
                  if matched:
                      entry["alarm_name"] = matched["AlarmName"]
                      entry["alarm_state"] = matched.get("StateValue", "UNKNOWN")
                      entry["actual_statistic"] = matched.get("Statistic", "N/A")
                      entry["actual_threshold"] = matched.get("Threshold", "N/A")
                      entry["actual_period"] = matched.get("Period", "N/A")
                      entry["has_actions"] = bool(matched.get("AlarmActions"))
                      results["found"].append(entry)
                  else:
                      results["missing"].append(entry)

              for alarm in existing:
                  if alarm.get("MetricName") not in recommended_metrics:
                      results["extra"].append({
                          "alarm_name": alarm["AlarmName"],
                          "metric_name": alarm.get("MetricName"),
                          "state": alarm.get("StateValue"),
                      })

              return results


          def generate_alarm_validation_html(instance_id: str, results: dict) -> str:
              """Generate the HTML section for alarm validation results."""
              found = results["found"]
              missing = results["missing"]
              extra = results["extra"]
              total = len(RECOMMENDED_CONNECT_ALARMS)
              found_count = len(found)
              missing_count = len(missing)
              coverage = round((found_count / total) * 100, 1) if total else 0

              if coverage >= 80:
                  cov_color = "#22c55e"
              elif coverage >= 50:
                  cov_color = "#f59e0b"
              else:
                  cov_color = "#ef4444"

              html = f"""<div class="section" id="mon-alarms">
                  <h3>CloudWatch Alarm Validation - Amazon Connect</h3>
