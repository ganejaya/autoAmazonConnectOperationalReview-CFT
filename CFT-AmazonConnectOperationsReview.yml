                  }, None

          """Get all phone numbers for the instance - single pass for both details and type counts"""
          def get_phone_numbers_with_basic_details(connect_client, instance_id):
              """Get all phone numbers with basic information and type counts in a single paginated scan."""

              phone_numbers = []
              phone_type_counts = {
                  'TOLL_FREE': 0, 'DID': 0, 'UIFN': 0, 'SHARED': 0,
                  'THIRD_PARTY_TF': 0, 'THIRD_PARTY_DID': 0, 'SHORT_CODE': 0
              }
              country_counts = Counter()
              status_counts = Counter()
              total_numbers = 0

              try:
                  paginator = connect_client.get_paginator('list_phone_numbers_v2')

                  for page in paginator.paginate(InstanceId=instance_id):
                      for number_summary in page.get('ListPhoneNumbersSummaryList', []):
                          total_numbers += 1
                          phone_type = number_summary.get('PhoneNumberType', 'UNKNOWN')
                          country_code = number_summary.get('PhoneNumberCountryCode', 'UNKNOWN')

                          # Count by type
                          if phone_type in phone_type_counts:
                              phone_type_counts[phone_type] += 1
                          country_counts[country_code] += 1

                          try:
                              detailed_info = connect_client.describe_phone_number(
                                  PhoneNumberId=number_summary['PhoneNumberId']
                              )
                              raw_status = detailed_info['ClaimedPhoneNumberSummary'].get('PhoneNumberStatus', 'UNKNOWN')
                              status = raw_status.get('Status', 'UNKNOWN') if isinstance(raw_status, dict) else raw_status
                              status_counts[status] += 1

                              phone_number_carrier = validate_phone_number_for_connect(number_summary['PhoneNumber'], country_code).get('carrier', 'Unknown')
                          except Exception as e:
                              logger.error(f"Error getting details for phone number {number_summary.get('PhoneNumber', '')}: {str(e)}")
                              status_counts['UNKNOWN'] += 1
                              phone_number_carrier = 'Unknown'

                          phone_numbers.append({
                              "phone_number_id": number_summary['PhoneNumberId'],
                              "phone_number": number_summary['PhoneNumber'],
                              "phone_number_type": phone_type,
                              "phone_number_country_code": country_code,
                              "phone_number_carrier": phone_number_carrier,
                          })
                          logger.debug(f"Phone Number: {number_summary['PhoneNumber']} Type: {phone_type} Carrier: {phone_number_carrier}")

                  phone_type_counts['_metadata'] = {
                      'total_numbers': total_numbers,
                      'country_distribution': dict(country_counts),
                      'status_distribution': dict(status_counts),
                      'countries_count': len(country_counts),
                      'most_common_country': country_counts.most_common(1)[0] if country_counts else None
                  }

                  return phone_numbers, phone_type_counts

              except Exception as e:
                  logger.error(f"Error listing phone numbers: {str(e)}")
                  phone_type_counts['_metadata'] = {'total_numbers': 0, 'country_distribution': {}, 'status_distribution': {}, 'countries_count': 0, 'most_common_country': None}
                  return [], phone_type_counts

          """Analyze Carrier Diversity"""
          def validate_phone_number_for_connect(phone_number, iso_country_code=None):
              """
              Validate a phone number using Amazon Pinpoint Phone Number Validation API
              to get service provider information for Amazon Connect phone numbers.

              Args:
                  phone_number (str): The phone number to validate (include country code)
                  iso_country_code (str, optional): Two-character ISO 3166-1 alpha-2 country code

              Returns:
                  dict: Phone number validation response with carrier and other details
              """
              try:
                  # Prepare the request
                  request_params = {
                      'NumberValidateRequest': {
                          'PhoneNumber': phone_number
                      }
                  }

                  # Add country code if provided
                  if iso_country_code:
                      request_params['NumberValidateRequest']['IsoCountryCode'] = iso_country_code

                  # Call the phone number validation API
                  response = pinpoint_client.phone_number_validate(**request_params)

                  # Extract validation details
                  validation_result = response['NumberValidateResponse']

                  # Format the result for easy consumption
                  result = {
                      'original_number': validation_result.get('OriginalPhoneNumber'),
                      'cleansed_e164': validation_result.get('CleansedPhoneNumberE164'),
                      'cleansed_national': validation_result.get('CleansedPhoneNumberNational'),
                      'carrier': validation_result.get('Carrier'),
                      'phone_type': validation_result.get('PhoneType'),
                      'phone_type_code': validation_result.get('PhoneTypeCode'),
                      'country': validation_result.get('Country'),
                      'country_code_iso2': validation_result.get('CountryCodeIso2'),
                      'country_code_numeric': validation_result.get('CountryCodeNumeric'),
                      'city': validation_result.get('City'),
                      'timezone': validation_result.get('Timezone'),
                      'zip_code': validation_result.get('ZipCode'),
                      'is_valid': validation_result.get('PhoneType') != 'INVALID'
                  }

                  return result

              except ClientError as e:
                  error_code = e.response['Error']['Code']
                  error_message = e.response['Error']['Message']

                  return {
                      'error': True,
                      'error_code': error_code,
                      'error_message': error_message,
                      'original_number': phone_number
                  }
              except Exception as e:
                  return {
                      'error': True,
                      'error_message': str(e),
                      'original_number': phone_number
                  }

          """Find contact flows where 'Set logging behavior' block is not enabled (set to TRUE)"""
          def find_flows_without_logging_enabled(instance_id, max_flows=1000):
              """Find flows without logging, skipping default/sample flows.

              Args:
                  instance_id: Amazon Connect instance ID
                  max_flows: Maximum number of flows to analyze (default 1000)

              Returns:
                  tuple: (flows_without_logging list, skipped_flows list, was_capped bool)
              """
              flows_without_logging = []
              skipped_flows = []
              skip_prefixes = ('default ', 'sample ')
              analyzed_count = 0
              was_capped = False

              try:
                  paginator = connect_client.get_paginator('list_contact_flows')
                  page_iterator = paginator.paginate(InstanceId=instance_id)

                  for page in page_iterator:
                      for flow_summary in page['ContactFlowSummaryList']:
                          flow_id = flow_summary['Id']
                          flow_name = flow_summary['Name']
                          flow_type = flow_summary['ContactFlowType']

                          # Skip default and sample flows
                          if flow_name.lower().startswith(skip_prefixes):
                              skipped_flows.append({
                                  'FlowId': flow_id,
                                  'FlowName': flow_name,
                                  'FlowType': flow_type,
                              })
                              logger.debug(f"Skipping default/sample flow: {flow_name}")
                              continue

                          # Cap at max_flows to avoid throttling
                          if analyzed_count >= max_flows:
                              was_capped = True
                              continue  # Keep counting skipped flows but stop analyzing

                          logger.debug(f"Analyzing flow: {flow_name} (ID: {flow_id})")

                          try:
                              # Rate limit: ~8 TPS to stay under 10 TPS DescribeContactFlow limit
                              time.sleep(0.12)
                              flow_details = connect_client.describe_contact_flow(
                                  InstanceId=instance_id,
                                  ContactFlowId=flow_id
                              )
                              flow_content = json.loads(flow_details['ContactFlow']['Content'])
                              logging_enabled = check_logging_behavior_in_flow(flow_content)
                              analyzed_count += 1

                              if not logging_enabled:
                                  flows_without_logging.append({
                                      'FlowId': flow_id,
                                      'FlowName': flow_name,
                                      'FlowType': flow_type,
                                      'FlowArn': flow_summary.get('Arn', ''),
                                      'Status': flow_summary.get('ContactFlowStatus', ''),
                                      'State': flow_summary.get('ContactFlowState', '')
                                  })

                          except Exception as e:
                              logger.error(f"Error analyzing flow {flow_name}: {str(e)}")
                              analyzed_count += 1
                              continue

              except Exception as e:
                  logger.error(f"Error listing contact flows: {str(e)}")
                  return [], [], False

              return flows_without_logging, skipped_flows, was_capped

          """Check if the flow contains a 'Set logging behavior' block with logging enabled"""
          def check_logging_behavior_in_flow(flow_content):

              state = False

              # Look for actions in the flow content
              actions = flow_content.get('Actions', [])

              for action in actions:
                  # Check if this is a Set logging behavior block
                  action_type = action.get('Type', '')
                  if action_type == 'UpdateFlowLoggingBehavior':

                      # Check the parameters to see if logging is enabled
                      parameters = action.get('Parameters', {})
                      logging_behavior = parameters.get('FlowLoggingBehavior', '')
                      logger.debug(f"parameters: {parameters}")
                      logger.debug(f"logging_behavior: {logging_behavior}")

                      # If LoggingBehavior is set to 'Enable', then logging is enabled
                      if logging_behavior == 'Enabled':
                          state = True
                          logger.debug(f"action_type: {action_type}")
                          break  # Stop searching once we find a logging block that is enabled

              # If no SetLoggingBehavior block found or none are enabled
              return state

          def get_channel_usage(instance_id, instance_arn, days_back):
              """Get contact counts by channel (VOICE, CHAT, TASK, EMAIL) using GetMetricDataV2."""
              try:
                  parsed = parse_connect_instance_arn(instance_arn)
                  region = parsed['aws_region']
                  regional_client = boto3.client('connect', region_name=region)

                  end_time = datetime.now(timezone.utc)
                  start_time = end_time - timedelta(days=days_back)

                  # Need at least one non-CHANNEL filter - use all standard queues
                  queues_resp = regional_client.list_queues(InstanceId=instance_id, QueueTypes=['STANDARD'])
                  queue_arns = [q['Arn'] for q in queues_resp.get('QueueSummaryList', [])]

                  if not queue_arns:
                      logger.info("No queues found - cannot query channel usage")
                      return {}

                  results = {}
                  next_token = None
                  while True:
                      kwargs = dict(
                          ResourceArn=instance_arn,
                          StartTime=start_time,
                          EndTime=end_time,
                          Interval={'TimeZone': 'UTC', 'IntervalPeriod': 'TOTAL'},
                          Filters=[{'FilterKey': 'QUEUE', 'FilterValues': queue_arns}],
                          Groupings=['CHANNEL'],
                          Metrics=[
                              {'Name': 'CONTACTS_CREATED'},
                              {'Name': 'CONTACTS_HANDLED'},
                              {'Name': 'AVG_HANDLE_TIME'},
                              {'Name': 'SUM_HANDLE_TIME'},
                          ]
                      )
                      if next_token:
                          kwargs['NextToken'] = next_token

                      resp = regional_client.get_metric_data_v2(**kwargs)

                      for mr in resp.get('MetricResults', []):
                          channel = mr.get('Dimensions', {}).get('CHANNEL', 'UNKNOWN')
                          if channel not in results:
                              results[channel] = {}
                          for col in mr.get('Collections', []):
                              metric_name = col['Metric']['Name']
                              results[channel][metric_name] = col.get('Value', 0)

                      next_token = resp.get('NextToken')
                      if not next_token:
                          break

                  return results

              except Exception as e:
                  logger.error(f"Error getting channel usage: {e}")
                  return {}


          def channel_usage_to_html(instance_id, instance_arn, days_back):
              """Generate HTML card for channel usage breakdown with cost recommendations."""
              usage = get_channel_usage(instance_id, instance_arn, days_back)

              if not usage:
                  return f"""<div class="section" id="cost-channel">
                      <h3>Channel Usage ({days_back}-day)</h3>
                      <p>No contact data available for the last {days_back} days.</p>
                      </div>"""

              html = f"""<div class="section" id="cost-channel">
                  <h3>Channel Usage ({days_back}-day)</h3>
                  <table style="width: 70%">
                      <tr><th>Channel</th><th>Contacts Created</th><th>Contacts Handled</th><th>Avg Handle Time</th><th>Total Handle Time</th></tr>"""

              channel_order = ['VOICE', 'CHAT', 'EMAIL', 'TASK', 'GUIDE']
              all_channels = list(usage.keys())
              ordered = [ch for ch in channel_order if ch in all_channels]
              ordered += [ch for ch in all_channels if ch not in ordered]

              total_created = 0
              total_handled = 0
              channel_created = {}
              channel_sum_ht = {}
              for ch in ordered:
                  metrics = usage[ch]
                  created = int(metrics.get('CONTACTS_CREATED', 0))
                  handled = int(metrics.get('CONTACTS_HANDLED', 0))
                  avg_ht = metrics.get('AVG_HANDLE_TIME', 0)
                  sum_ht = metrics.get('SUM_HANDLE_TIME', 0)
                  total_created += created
                  total_handled += handled
                  channel_created[ch] = created
                  channel_sum_ht[ch] = sum_ht

                  avg_ht_str = f"{int(avg_ht // 60)}m {int(avg_ht % 60)}s" if avg_ht else '-'
                  sum_ht_hrs = sum_ht / 3600 if sum_ht else 0
                  sum_ht_str = f"{sum_ht_hrs:.1f} hrs" if sum_ht else '-'

                  html += f"""<tr>
                      <td style="font-weight:600">{escape(ch)}</td>
                      <td style="text-align:center">{escape(str(created))}</td>
                      <td style="text-align:center">{escape(str(handled))}</td>
                      <td style="text-align:center">{avg_ht_str}</td>
                      <td style="text-align:center">{sum_ht_str}</td>
                      </tr>"""

              html += f"""<tr style="font-weight:700;border-top:2px solid #333">
                      <td>TOTAL</td>
                      <td style="text-align:center">{total_created}</td>
                      <td style="text-align:center">{total_handled}</td>
                      <td></td><td></td>
                      </tr>
                  </table>"""

              # ── Cost Recommendations based on channel mix ──
              recommendations = []

              voice_created = channel_created.get('VOICE', 0)
              chat_created = channel_created.get('CHAT', 0)
              task_created = channel_created.get('TASK', 0)
              email_created = channel_created.get('EMAIL', 0)

              voice_pct = (voice_created / total_created * 100) if total_created > 0 else 0
              chat_pct = (chat_created / total_created * 100) if total_created > 0 else 0

              voice_sum_ht = channel_sum_ht.get('VOICE', 0)
              voice_avg_ht = (voice_sum_ht / voice_created) if voice_created > 0 else 0

              if voice_pct > 80 and total_created > 100:
                  recommendations.append(get_recommendation("channel_voice_heavy", voice_pct=voice_pct))
              if chat_created == 0 and voice_created > 100:
                  recommendations.append(get_recommendation("channel_no_chat"))
              if task_created == 0 and total_created > 100:
                  recommendations.append(get_recommendation("channel_no_tasks"))
              if voice_avg_ht > 600 and voice_created > 50:
                  recommendations.append(get_recommendation("channel_high_voice_ht", avg_ht=voice_avg_ht))
              if chat_pct > 0 and voice_pct > 0:
                  recommendations.append(get_recommendation("channel_multi_channel", voice_pct=voice_pct, chat_pct=chat_pct))
              if email_created > 0:
                  recommendations.append(get_recommendation("channel_email_active", email_count=email_created))
              recommendations.append(get_recommendation("channel_usage_general"))

              html += """<h4>Cost Recommendations</h4><ul>"""
              for rec in recommendations:
                  html += f"<li>{rec}</li>"
              html += """</ul></div>"""

              return html


          # ── Centralized Recommendations ──
          # All recommendation text is maintained here and injected into the HTML report.
          # Each key returns an HTML string with <h4> and <ul> blocks.

          def get_recommendation(key, **kwargs):
              """Return HTML recommendation block by key. Pass dynamic values via kwargs."""

              recommendations = {

                  "identity_management": lambda: f"""<h4>Recommendation</h4>
                      <ul>
                          <li>This instance is not using <strong>SAML 2.0-based authentication</strong>. AWS recommends SAML 2.0 federation with an external identity provider (IdP) such as Okta, Azure AD, or AWS IAM Identity Center for production Amazon Connect instances.</li>
                          <li><strong>SAML 2.0 federation</strong> provides centralized identity management, single sign-on (SSO), multi-factor authentication (MFA) enforcement, and automated user provisioning/deprovisioning through your corporate IdP.</li>
                          <li><strong>CONNECT_MANAGED</strong> identity stores user credentials within Amazon Connect, which limits integration with enterprise identity governance, does not support MFA natively, and requires separate credential management.</li>
                          <li><strong>EXISTING_DIRECTORY</strong> (AWS Directory Service) provides Active Directory integration but SAML 2.0 is preferred for its broader IdP compatibility and SSO capabilities.</li>
                          <li>Refer to <a href="https://docs.aws.amazon.com/connect/latest/adminguide/configure-saml.html" target="_blank">Configure SAML for Amazon Connect</a> and <a href="https://docs.aws.amazon.com/connect/latest/adminguide/security-best-practices.html" target="_blank">Security Best Practices</a> for migration guidance.</li>
                      </ul>""",

