                      comp_display = m["rec_comparison"].replace("GreaterThanOrEqualToThreshold", "&ge;").replace("GreaterThanThreshold", "&gt;")
                      html += f"""<tr style="background-color: #fef2f2;">
                          <td><code>{escape(m["metric_name"])}</code></td>
                          <td><span style="background:{sev_c}; color:#fff; padding:2px 8px; border-radius:999px; font-size:0.8em;">{escape(m["severity"])}</span></td>
                          <td>{escape(m["description"])}</td>
                          <td>{escape(m["rec_statistic"])} {comp_display} {m["rec_threshold"]} / {m["rec_period"]}s</td>
                      </tr>"""
                  html += "</table>"
              else:
                  html += '<br><p style="color:#22c55e; font-weight:bold;">&#9989; All recommended alarms are configured.</p>'

              # Found alarms
              if found:
                  triggered_count = sum(1 for f in found if f.get("alarm_state") == "ALARM")
                  triggered_note = f' - <span style="color:#ef4444; font-weight:bold;">&#128680; {triggered_count} TRIGGERED</span>' if triggered_count > 0 else ""
                  html += f"""<br><h4>&#9989; Configured Alarms ({found_count}){triggered_note}</h4>
                      <table style="width: 90%">
                      <tr><th>Metric</th><th>Alarm Name</th><th>State</th><th>Severity</th><th>Threshold</th><th>Actions?</th></tr>"""
                  for f_item in found:
                      sev_c = SEVERITY_COLORS.get(f_item["severity"], "#64748b")
                      st_c = STATE_COLORS.get(f_item.get("alarm_state", "UNKNOWN"), "#9ca3af")
                      actions_txt = "&#9989; Yes" if f_item.get("has_actions") else "&#9888;&#65039; No"
                      is_triggered = f_item.get("alarm_state") == "ALARM"
                      row_bg = "#fef2f2" if is_triggered else "#f0fdf4"
                      row_border = "border-left: 4px solid #ef4444;" if is_triggered else ""
                      triggered_icon = " &#128680;" if is_triggered else ""
                      html += f"""<tr style="background-color: {row_bg}; {row_border}">
                          <td><code>{escape(f_item["metric_name"])}</code>{triggered_icon}</td>
                          <td>{escape(f_item.get("alarm_name", ""))}</td>
                          <td><span style="background:{st_c}; color:#fff; padding:2px 8px; border-radius:999px; font-size:0.8em; {'font-weight:bold;' if is_triggered else ''}">{escape(f_item.get("alarm_state", "?"))}</span></td>
                          <td><span style="background:{sev_c}; color:#fff; padding:2px 8px; border-radius:999px; font-size:0.8em;">{escape(f_item["severity"])}</span></td>
                          <td>{escape(str(f_item.get("actual_statistic", "?")))} {f_item.get("actual_threshold", "?")}</td>
                          <td>{actions_txt}</td>
                      </tr>"""
                  html += "</table>"

              # Extra alarms
              if extra:
                  html += f"""<br><h4>&#128270; Additional Connect Alarms (not in recommendations) ({len(extra)})</h4>
                      <table style="width: 70%">
                      <tr><th>Alarm Name</th><th>Metric</th><th>State</th></tr>"""
                  for e in extra:
                      st_c = STATE_COLORS.get(e.get("state", "UNKNOWN"), "#9ca3af")
