                  return html_content, instance

              except Exception as e:
                  import sys
                  return {
                      'statusCode': 400,
                      'body': json.dumps({
                          'error': 'AWS API Error',
                          'line': sys.exc_info()[2].tb_lineno if sys.exc_info()[2] else None,
                          'message': f'Error describing instance: {str(e)}'
