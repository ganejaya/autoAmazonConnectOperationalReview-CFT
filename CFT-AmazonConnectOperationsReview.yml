                      </div>
                      <div class="container">
                      <!--SUMMARY_PLACEHOLDER-->
                      <div class="section">
                          <h2>Amazon Connect Instance Information</h2>
                          <h3>Describe Connect</h3>
                          <table>
                              <tr><th>Instance ID</th><td>{escape(instance.get('Id', 'N/A'))}</td></tr>
                              <tr><th>Instance ARN</th><td>{escape(instance.get('Arn', 'N/A'))}</td></tr>
