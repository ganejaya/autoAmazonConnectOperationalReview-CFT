# CloudFormation template for Amazon Connect Operational Review
AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Amazon Connect Operational Review with embedded Lambda code. Please use us-east-1 to import this template file.'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Amazon Connect Operational Review Configuration"
        Parameters:
          - AmazonConnectInstanceARN
          - AmazonConnectCloudWatchLogGroup
          - AmazonS3ForReports
    ParameterLabels:
      AmazonConnectInstanceARN:
        default: "Amazon Connnect Instance ARN"
      AmazonConnectCloudWatchLogGroup:
        default: "Amazon Connect CloudWatch LogGroup"
      AmazonS3ForReports:
        default: "Amazon S3 bucket name"
        
Parameters:
  AmazonConnectInstanceARN:
    Type: String
    Description: 'The ARN of your Amazon Connect instance for this review. Example: arn:aws:connect:<region>:<account-id>:instance/<resource-id>'
  
  AmazonConnectCloudWatchLogGroup:
    Type: String
    Description: 'The ARN of your Amazon Connect instance CloudWatch Log Group resource. Example: /aws/connect/connect-instance-name'
  
  AmazonS3ForReports:
    Type: String
    Description: 'Existing S3 Bucket name for uploading Operational review reports'
    MinLength: 3
    MaxLength: 63
    ConstraintDescription: 'Must be a valid S3 bucket name'

Resources:
  # IAM Role for Lambda execution with required permissions
  AmazonConnectOperationalReviewLambdaExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonConnectReadOnlyAccess
        - arn:aws:iam::aws:policy/AWSCloudTrail_ReadOnlyAccess
        - arn:aws:iam::aws:policy/ServiceQuotasReadOnlyAccess
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
        
      Policies:
      - PolicyDocument:
          Version: "2012-10-17"
          Statement:
          - Resource: "*"
            Action: "mobiletargeting:PhoneNumberValidate"
            Effect: "Allow"
            Sid: "VisualEditor0"
        PolicyName: "PinpointPhoneNumberValidateReadOnlyAccess"
      - PolicyDocument:
          Version: "2012-10-17"
          Statement:
          - Resource: !Sub 'arn:aws:s3:::${AmazonS3ForReports}/*'
            Action: "s3:PutObject"
            Effect: "Allow"
            Sid: "VisualEditor0"
        PolicyName: "PutObjectToS3-Review"

  # Lambda function with embedded code
  LambdaFunctionAmazonConnectOperationalReviewauto:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "amazonConnectOperationalReview-auto"
      Handler: "index.lambda_handler"
      Role: !GetAtt AmazonConnectOperationalReviewLambdaExecutionRole.Arn
      Runtime: python3.13
      Timeout: 900
      MemorySize: 256
      Environment:
        Variables:
          CONNECT_INSTANCE_ARN: !Ref AmazonConnectInstanceARN
          CONNECT_CW_LOG_GROUP: !Ref AmazonConnectCloudWatchLogGroup
          S3_REPORTING_BUCKET: !Ref AmazonS3ForReports
      Code:
        ZipFile: |
          # Amazon Connect Operational Review - Automated Report Generator
          #
          # Collects instance configuration, contact flow analysis, phone number inventory,
          # queue/routing metrics, CloudWatch alarms, CloudTrail audit events, and service
          # quota utilization from an Amazon Connect instance, then generates an HTML
          # operational review report and uploads it to a designated S3 bucket.

          import boto3
          import json
          import logging
          import os
          import sys
          import traceback
          from botocore.exceptions import ClientError
          from html import escape
          from datetime import datetime, timezone, timedelta
          from collections import defaultdict
          import statistics
          import time
          import re
          from collections import Counter

          # Configure logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          # Format the datetime object into a string including the timezone name
          currentDateAndTime = datetime.now()
          datetime_string = currentDateAndTime.strftime("%Y-%m-%d %H:%M:%S %Z%z")

          # Initialize Connect client
          connect_client = boto3.client('connect')

          # Initialize S3 client
          s3_client = boto3.client('s3')  

          # Initialize CloudWatch client
          cloudwatch_client = boto3.client('cloudwatch')

          # Initialize CloudTrail client
          cloudtrail_client = boto3.client('cloudtrail')    

          # Initialize Pinpoint client
          pinpoint_client = boto3.client('pinpoint')

          # Initialize Service Quotas client
          service_quotas_client = boto3.client('service-quotas')

          """Parse instance_id and aws_region from Amazon Connect instance ARN"""
          def parse_connect_instance_arn(instance_arn):
              """
                  ARN format: arn:aws:connect:region:account-id:instance/instance-id

              Args:
                  instance_arn (str): Amazon Connect instance ARN

              Returns:
                  dict: Contains instance_id, aws_region, account_id, and other components
              """

              if not instance_arn or not isinstance(instance_arn, str):
                  raise ValueError("Invalid ARN provided in envonment variable - CONNECT_INSTANCE_ARN")

              # Split ARN by colons
              arn_parts = instance_arn.split(':')

              if len(arn_parts) < 6 or arn_parts[0] != 'arn' or arn_parts[2] != 'connect':
                  raise ValueError(f"Invalid Connect instance ARN format: {instance_arn}")

              # Extract components
              aws_region = arn_parts[3]
              account_id = arn_parts[4]
              resource_part = arn_parts[5]  # instance/instance-id

              # Extract instance ID from resource part
              if not resource_part.startswith('instance/'):
                  raise ValueError(f"Invalid resource type in ARN: {resource_part}")

              instance_id = resource_part.split('/', 1)[1]

              return {
                  'instance_id': instance_id,
                  'aws_region': aws_region,
                  'account_id': account_id,
                  'service': arn_parts[2],
                  'partition': arn_parts[1],
                  'resource_type': 'instance',
                  'full_arn': instance_arn
              }

          def get_connect_service_quota(service_quotas_client, service_code, quota_code, context_id=None):
              """
              Get a single service quota name and value with retry-on-throttle.
              Falls back to default if no instance-specific quota exists.

              Returns:
                  tuple: (quota_name, quota_value)
              """
              params = {'ServiceCode': service_code, 'QuotaCode': quota_code}
              if context_id:
                  params['ContextId'] = context_id

              for attempt in range(4):
                  try:
                      time.sleep(0.25)
                      response = service_quotas_client.get_service_quota(**params)
                      quota_name = response['Quota']['QuotaName']
                      quota_value = response['Quota']['Value']
                      logger.debug(f"  Retrieved quota {quota_name}: {quota_value}")
                      return quota_name, quota_value

                  except ClientError as e:
                      error_code = e.response['Error']['Code']

                      # Retry on throttling
                      if error_code == 'TooManyRequestsException':
                          wait = 0.5 * (2 ** attempt)
                          logger.debug(f"  Throttled on {quota_code}, retrying in {wait}s (attempt {attempt+1})")
                          time.sleep(wait)
                          continue

                      # Fall back to default quota (no context_id) for instance-specific errors
                      if error_code in ('NoSuchResourceException', 'IllegalArgumentException') and context_id:
                          try:
                              response = service_quotas_client.get_service_quota(
                                  ServiceCode=service_code, QuotaCode=quota_code
                              )
                              return response['Quota']['QuotaName'], response['Quota']['Value']
                          except ClientError as fallback_error:
                              logger.error(f"  Fallback error for {quota_code}: {fallback_error.response['Error']['Code']}")
                              return quota_code, None

                      logger.error(f"  Error for {quota_code}: {error_code}")
                      return quota_code, None

              logger.error(f"  Max retries exceeded for {quota_code}")
              return quota_code, None

          def get_color_by_percentage(percentage):
              """Return color code based on percentage value"""
              if percentage >= 98:
                  return "#FF0000"  # Red - Critical
              elif percentage >= 80:
                  return "#FFA500"  # Orange - Warning  
              #elif percentage >= 50:
              #    return "#FFFF00"  # Yellow - Caution
              else:
                  return "#00FF00"  # Green - Normal

          """Get Current utilization for Amazon Connect"""
          def count_paginated(client, method: str, list_key: str, **kwargs) -> int:
              """Generic paginator counter for any Connect list_* API."""
              total = 0
              paginator = client.get_paginator(method)
              for page in paginator.paginate(**kwargs):
                  total += len(page[list_key])
              return total


          def _count_manual(client, method: str, list_key: str, **kwargs) -> int:
              """Manual pagination counter for newer Connect APIs not yet in the paginator registry."""
              total = 0
              api_call = getattr(client, method)
              while True:
                  resp = api_call(**kwargs)
                  total += len(resp.get(list_key, []))
                  token = resp.get('NextToken')
                  if not token:
                      break
                  kwargs['NextToken'] = token
              return total

          """Get Current utilization for Amazon Connect"""
          def current_utilization (instance_id: str, metric: str) -> int:
              """
              Return the current utilization count for a single metric.

              Args:
                  instance_id: Amazon Connect instance id
                  metric: One of Users, ContactFlows, PhoneNumbers, Queues, RoutingProfiles,
                          SecurityProfiles, HoursOfOperation, QuickConnects, LexBotsV1, LexBotsV2

              Returns:
                  int count, or raises ValueError for unknown metric
              """

              metric_map = {
                  'Users':              lambda: count_paginated(connect_client, 'list_users',              'UserSummaryList',              InstanceId=instance_id),
                  'ContactFlows':       lambda: count_paginated(connect_client, 'list_contact_flows',      'ContactFlowSummaryList',       InstanceId=instance_id),
                  'PhoneNumbers':       lambda: count_paginated(connect_client, 'list_phone_numbers_v2',   'ListPhoneNumbersSummaryList',  InstanceId=instance_id),
                  'Queues':             lambda: count_paginated(connect_client, 'list_queues',             'QueueSummaryList',             InstanceId=instance_id, QueueTypes=['STANDARD']),
                  'RoutingProfiles':    lambda: count_paginated(connect_client, 'list_routing_profiles',   'RoutingProfileSummaryList',    InstanceId=instance_id),
                  'SecurityProfiles':   lambda: count_paginated(connect_client, 'list_security_profiles',  'SecurityProfileSummaryList',   InstanceId=instance_id),
                  'HoursOfOperation':   lambda: count_paginated(connect_client, 'list_hours_of_operations','HoursOfOperationSummaryList',  InstanceId=instance_id),
                  'QuickConnects':      lambda: count_paginated(connect_client, 'list_quick_connects',     'QuickConnectSummaryList',      InstanceId=instance_id),
                  'LexBotsV1':          lambda: count_paginated(connect_client, 'list_bots',               'LexBots',                     InstanceId=instance_id, LexVersion='V1'),
                  'LexBotsV2':          lambda: count_paginated(connect_client, 'list_bots',               'LexBots',                     InstanceId=instance_id, LexVersion='V2'),
                  'UserHierarchyGroups': lambda: count_paginated(connect_client, 'list_user_hierarchy_groups', 'UserHierarchyGroupSummaryList', InstanceId=instance_id),
                  'LambdaFunctions':   lambda: count_paginated(connect_client, 'list_lambda_functions',    'LambdaFunctions',              InstanceId=instance_id),
                  'IntegrationAssociations': lambda: count_paginated(connect_client, 'list_integration_associations', 'IntegrationAssociationSummaryList', InstanceId=instance_id, IntegrationType='APPLICATION'),
                  'Prompts':            lambda: count_paginated(connect_client, 'list_prompts',            'PromptSummaryList',            InstanceId=instance_id),
                  'DataTables':         lambda: _count_manual(connect_client, 'list_data_tables',        'DataTableSummaryList',         InstanceId=instance_id),
                  'Notifications':      lambda: _count_manual(connect_client, 'list_notifications',      'NotificationSummaryList',      InstanceId=instance_id),
                  'Workspaces':         lambda: _count_manual(connect_client, 'list_workspaces',         'WorkspaceSummaryList',         InstanceId=instance_id),
              }

              if metric not in metric_map:
                  raise ValueError(f"Unknown metric '{metric}'. Valid options: {list(metric_map.keys())}")

              return metric_map[metric]()


          def count_email_addresses(instance_id: str) -> int:
              """Count email addresses using SearchEmailAddresses API."""
              total = 0
              kwargs = {'InstanceId': instance_id, 'MaxResults': 100}
              while True:
                  resp = connect_client.search_email_addresses(**kwargs)
                  total += len(resp.get('EmailAddresses', []))
                  token = resp.get('NextToken')
                  if not token:
                      break
                  kwargs['NextToken'] = token
              return total


          def max_queues_per_routing_profile(instance_id: str) -> int:
              """Find the maximum number of queues across all routing profiles."""
              max_count = 0
              paginator = connect_client.get_paginator('list_routing_profiles')
              for page in paginator.paginate(InstanceId=instance_id):
                  for rp in page.get('RoutingProfileSummaryList', []):
                      rp_id = rp['Id']
                      q_count = count_paginated(
                          connect_client, 'list_routing_profile_queues',
                          'RoutingProfileQueueConfigSummaryList',
                          InstanceId=instance_id, RoutingProfileId=rp_id
                      )
                      if q_count > max_count:
                          max_count = q_count
              return max_count


          """Segregate data based on multiple JSON elements."""
          def segregate_by_multiple_criteria(data, criteria):
              """
              Args:
                  data (list): List of dictionaries
                  criteria (list): List of keys to create composite grouping

              Returns:
                  dict: Dictionary with segregated data using composite keys
              """
              segregated = defaultdict(list)

              for item in data:
                  # Create composite key from multiple criteria
                  key_parts = []
                  for criterion in criteria:
                      if criterion in item:
                          key_parts.append(str(item[criterion]))
                      else:
                          key_parts.append('_missing')

                  composite_key = ' | '.join(key_parts)
                  segregated[composite_key].append(item)

              return dict(segregated)

          """Comprehensive analyze of missed calls summary for Amazon Connect"""
          def summarize_missed_calls(instance_id, days_back):
              html_content = f"<p>Analyzing missed calls over the last {days_back} days.</p>"

              # Calculate time range for last 2 weeks
              end_time = datetime.utcnow()
              start_time = end_time - timedelta(days_back)

              logger.debug(f"Retrieving missed calls data from {start_time.date()} to {end_time.date()}")
              logger.debug(f"Instance ID: {instance_id}")

              try:
                  # Get missed calls metrics with daily granularity
                  response = cloudwatch_client.get_metric_statistics(
                      Namespace='AWS/Connect',
                      MetricName='MissedCalls',
                      Dimensions=[
                          {'Name': 'InstanceId', 'Value': instance_id},
                          {'Name': 'MetricGroup', 'Value': 'VoiceCalls'}
                      ],
                      StartTime=start_time,
                      EndTime=end_time,
                      Period=86400,  # Daily statistics (24 hours)
                      Statistics=['Sum']
                  )

                  # Process daily data
                  daily_data = []
                  total_missed_calls = 0

                  for datapoint in sorted(response['Datapoints'], key=lambda x: x['Timestamp']):
                      date = datapoint['Timestamp'].date()
                      missed_calls = int(datapoint['Sum'])
                      total_missed_calls += missed_calls
                      daily_data.append((date, missed_calls))

                  logger.debug(f"\n{'='*60}")
                  logger.debug(f"MISSED CALLS SUMMARY - LAST 2 WEEKS")
                  logger.debug(f"{'='*60}")

                  # Daily breakdown
                  logger.debug(f"\nDAILY BREAKDOWN:")
                  logger.debug(f"{'-'*40}")
                  for date, count in daily_data:
                      day_name = date.strftime('%A')
                      logger.debug(f"{date} ({day_name}): {count:,} missed calls")

                  # Calculate statistics
                  if daily_data:
                      missed_calls_counts = [count for _, count in daily_data]
                      daily_average = statistics.mean(missed_calls_counts)
                      daily_median = statistics.median(missed_calls_counts)
                      max_missed = max(missed_calls_counts)
                      min_missed = min(missed_calls_counts)

                      # Find peak day
                      peak_day = max(daily_data, key=lambda x: x[1])

                      logger.debug(f"\n{'='*60}")
                      logger.debug(f"SUMMARY STATISTICS")
                      logger.debug(f"{'='*60}")
                      html_content+=f"""
                      <table style="width: 60%;">
                          <tr><th>Metric</th><th style="text-align:center;">Value</th></tr>
                          <tr><td>Total Missed Calls ({days_back}d)</td><td style="text-align:center;">{total_missed_calls:,}</td></tr>
                          <tr><td>Daily Average</td><td style="text-align:center;">{daily_average:.1f}</td></tr>
                          <tr><td>Daily Median</td><td style="text-align:center;">{daily_median:.1f}</td></tr>
                          <tr><td>Highest Single Day</td><td style="text-align:center;">{max_missed:,}</td></tr>
                          <tr><td>Lowest Single Day</td><td style="text-align:center;">{min_missed:,}</td></tr>
                          <tr><td>Peak Day</td><td style="text-align:center;">{peak_day[0]} ({peak_day[0].strftime('%A')}) - {peak_day[1]:,}</td></tr>
                      </table>"""

                      # Weekly comparison
                      week1_data = [count for date, count in daily_data if date < start_time.date() + timedelta(days=7)]
                      week2_data = [count for date, count in daily_data if date >= start_time.date() + timedelta(days=7)]

                      if week1_data and week2_data:
                          week1_total = sum(week1_data)
                          week2_total = sum(week2_data)
                          week1_avg = statistics.mean(week1_data)
                          week2_avg = statistics.mean(week2_data)

                          change_percent = ((week2_total - week1_total) / week1_total) * 100 if week1_total > 0 else 0

                          logger.debug(f"\n{'='*60}")
                          logger.debug(f"WEEKLY COMPARISON")
                          logger.debug(f"{'='*60}")
                          logger.debug(f"Week 1 total: {week1_total:,} missed calls (avg: {week1_avg:.1f}/day)")
                          logger.debug(f"Week 2 total: {week2_total:,} missed calls (avg: {week2_avg:.1f}/day)")
                          logger.debug(f"Week-over-week change: {change_percent:+.1f}%")

                          if change_percent > 10:
                              logger.debug("⚠️  Significant increase in missed calls detected!")
                          elif change_percent < -10:
                              logger.debug("✅ Significant improvement in missed calls!")

                  else:
                      logger.debug("No missed calls data available for the specified time period.")
                      html_content+=f"<p>No missed calls data available for the specified time period.</p>"
                  if daily_data and statistics.mean([c for _, c in daily_data]) > 5:
                      html_content += get_recommendation("missed_calls")
                  return html_content

              except Exception as e:
                  logger.error(f"Error retrieving metrics: {str(e)}")
                  html_content+=f"<br>Error retrieving metrics: {str(e)}"

          """Lookup CloudTrail events for Amazon Connect"""
          def lookup_connect_cloudtrail_events(account_id, days_back, aws_region, max_seconds=120):
              """
              Lookup CloudTrail events for Amazon Connect with a time budget.
              Returns whatever events have been collected when the time budget expires.

              Args:
                  account_id (str): AWS account ID
                  days_back : days back for event lookup
                  aws_region (str): AWS region
                  max_seconds (int): Maximum seconds to spend collecting events (default 120)

              Returns:
                  tuple: (connect_events list, timed_out bool)
              """
              end_time = datetime.utcnow()
              start_time = end_time - timedelta(hours=24*days_back)
              deadline = time.time() + max_seconds

              logger.debug(f"Start Time for lookup_connect_cloudtrail_events: {start_time}")
              logger.debug(f"End Time for lookup_connect_cloudtrail_events: {end_time}")
              logger.info(f"CloudTrail lookup time budget: {max_seconds}s")

              connect_events = []
              timed_out = False
              pages_processed = 0

              try:
                  lookup_attributes = [
                      {
                          'AttributeKey': 'EventSource',
                          'AttributeValue': 'connect.amazonaws.com'
                      }
                  ]

                  paginator = cloudtrail_client.get_paginator('lookup_events')

                  for page in paginator.paginate(
                      LookupAttributes=lookup_attributes,
                      StartTime=start_time,
                      EndTime=end_time
                  ):
                      pages_processed += 1
                      for event in page['Events']:
                          event_data = parse_connect_event(event)
                          if event_data:
                              connect_events.append(event_data)

                      # Check time budget after each page
                      if time.time() >= deadline:
                          timed_out = True
                          logger.info(f"CloudTrail lookup reached {max_seconds}s time budget after {pages_processed} pages, {len(connect_events)} events collected")
                          break

                  return connect_events, timed_out

              except ClientError as e:
                  logger.debug(f"Error looking up CloudTrail events: {e}")
                  return connect_events, timed_out

          """Parse and enrich Connect CloudTrail event"""
          def parse_connect_event(event):

              try:
                  cloud_trail_event = json.loads(event.get('CloudTrailEvent', '{}'))

                  # Extract key information
                  event_data = {
                      'eventId': event.get('EventId'),
                      'eventName': event.get('EventName'),
                      'eventTime': event.get('EventTime'),
                      'username': event.get('Username'),
                      'eventSource': cloud_trail_event.get('eventSource'),
                      'awsRegion': cloud_trail_event.get('awsRegion'),
                      'sourceIPAddress': cloud_trail_event.get('sourceIPAddress'),
                      'userAgent': cloud_trail_event.get('userAgent'),
                      'requestId': cloud_trail_event.get('requestID'),
                      'userIdentity': cloud_trail_event.get('userIdentity', {}),
                     # 'requestParameters': cloud_trail_event.get('requestParameters', {}),
                     # 'response_elements': cloud_trail_event.get('responseElements', {}),
                      'errorCode': cloud_trail_event.get('errorCode'),
                      'errorMessage': cloud_trail_event.get('errorMessage')
                  }

                  return event_data

              except Exception as e:
                  print(f"Error parsing event: {e}")
                  return None

          """Comprehensive analysis of Amazon Connect API Throttles"""
          def summarize_amazon_api_throttles(instance_id, account_id, days_back, aws_region, max_seconds=120):

              html_content = ""

              try:
                  # Get events with time budget
                  events, timed_out = lookup_connect_cloudtrail_events(account_id, days_back, aws_region, max_seconds=max_seconds)

                  partial_note = ""
                  if timed_out:
                      partial_note = f' <span style="color:#f59e0b;">&#9888;&#65039; <em>Partial results - analysis stopped after {max_seconds}s time limit. Increase the time budget or reduce days_back for complete results.</em></span>'

                  html_content += f"""<p>Analyzing Amazon Connect API events over the last {days_back} days.{partial_note}</p>"""
                  html_content += f"""<p>Collected <strong>{len(events)}</strong> Amazon Connect events during this time-period.</p>"""

                  # Use a defaultdict to store counts for each category
                  category_counts = defaultdict(int)
                  total_throttled_count = 0

                  for item in events:
                      category = item.get("eventName")
                      if item.get("errorCode") == 'TooManyRequestsException' and item.get("awsRegion") == aws_region:
                          category_counts[category] += 1
                          total_throttled_count += 1

                  html_content += f"""<p>Found <strong>{total_throttled_count}</strong> throttled API calls in account {escape(account_id)}, region {escape(aws_region)}.</p>"""

                  if total_throttled_count > 0:
                      html_content += f"""
                          <table style="width: 60%">
                          <tr><th>API Event Name</th><th>Throttle Count</th></tr>"""
                      for category, count in sorted(category_counts.items(), key=lambda x: x[1], reverse=True):
                          html_content += f"""<tr><td><code>{escape(category)}</code></td><td style="text-align:center;">{count}</td></tr>"""
                      html_content += """</table>"""
                      html_content += get_recommendation("api_throttling")
                  else:
                      html_content += """<p style="color:#22c55e;">&#9989; No API throttling detected during this period.</p>"""

                  return html_content

              except Exception as e:
                  logger.error(f"Error retrieving Amazon Connect API throttling metrics: {str(e)}")
                  return f"<p style='color:#ef4444;'>Error retrieving API throttling summary. Check the logs.</p>"

          """HTML Report upload to S3 bucket"""
          def upload_string_to_s3(string_data, bucket_name, object_key, content_type):
              try:
                  response = s3_client.put_object(
                      Bucket=bucket_name,
                      Key=object_key,
                      Body=string_data,
                      ContentType=content_type
                  )
                  logger.info(f"Report uploaded successfully to https://{bucket_name}.s3.amazonaws.com/{object_key}. ETag: {response['ETag']}")
                  return True
              except ClientError as e:
                  print(f"Error uploading to S3: {e}")
                  return False

          """Get Connect Instance Details"""
          def describe_connect_to_html(instance_id):
              try:
                  # Describe the instance
                  response = connect_client.describe_instance(InstanceId=instance_id)
                  instance = response['Instance']

                  # Generate HTML
                  html_content = f"""
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <title>Amazon Contact Center - Operations Review</title>
                      <style>
                          :root {{
                              --aws-dark: #232F3E;
                              --aws-orange: #FF9900;
                              --aws-blue: #1A73E8;
                              --border: #e2e8f0;
                              --bg: #f7f8fc;
                              --card-bg: #ffffff;
                              --text: #334155;
                              --text-light: #64748b;
                          }}
                          * {{ box-sizing: border-box; margin: 0; padding: 0; }}
                          body {{
                              font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
